    <div class = "game-container">
        <div class = "turn-indicator">

            <div class = "Red-Turn">Red's Turn</div>
            <p id = "divider">|</p>
            <div class = "Black-Turn">Black's Turn</div>
        </div>
    </div>
    <!-- Reset Button -->
    <button id = "resetButton" class = "button primary">Reset Game</button>

    <!-- Link to javascript file with game logic -->
    <script src = "checkers.js" defer></script>
</html>
